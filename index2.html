<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫の飼い方ガイド AI相談室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body {
            font-family: 'Noto+Sans+JP', sans-serif;
            background-color: #fdf6e3;
        }
        .chat-bubble {
            max-width: 85%;
            border-radius: 1.25rem;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }
        .user-bubble {
            background-color: #f97316;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2);
        }
        .ai-bubble {
            background-color: #ffffff;
            color: #374151;
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #fef3c7;
        }
        /* AI回答内のMarkdown装飾 */
        .ai-bubble h1, .ai-bubble h2, .ai-bubble h3 { font-weight: bold; margin-top: 0.5rem; margin-bottom: 0.5rem; color: #9a3412; }
        .ai-bubble ul, .ai-bubble ol { padding-left: 1.5rem; margin-bottom: 1rem; }
        .ai-bubble ul { list-style-type: disc; }
        .ai-bubble li { margin-bottom: 0.25rem; }
        .ai-bubble strong { color: #ea580c; }
        
        .source-link {
            display: inline-block;
            background-color: #fff7ed;
            border: 1px solid #ffedd5;
            color: #9a3412;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            margin-right: 0.5rem;
            margin-top: 0.5rem;
            transition: all 0.2s;
        }
        .source-link:hover {
            background-color: #ffedd5;
            border-color: #fed7aa;
        }

        .loading-dots div {
            width: 8px;
            height: 8px;
            background-color: #f97316;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dots .dot2 { animation-delay: 0.2s; }
        .loading-dots .dot3 { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-orange-100 p-4 sticky top-0 z-10 shadow-sm">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <button onclick="resetToWelcome()" class="flex items-center space-x-2 hover:opacity-80 transition-opacity">
                <span class="text-3xl">🐾</span>
                <h1 class="text-xl font-bold text-orange-800">猫の飼い方 AI相談室</h1>
            </button>
            <div class="text-sm text-orange-600 bg-orange-50 px-3 py-1 rounded-full font-medium hidden sm:block">
                AIアドバイザー稼働中
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-4xl w-full mx-auto p-4 flex flex-col">
        
        <!-- Welcome Section -->
        <div id="welcome-screen" class="my-8 text-center bg-white p-8 rounded-3xl shadow-sm border border-orange-50">
            <div class="relative overflow-hidden rounded-2xl mb-6 shadow-md">
                <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&q=80&w=1600&h=900" 
                     alt="幸せな猫" class="w-full h-64 object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent flex items-end p-6">
                    <p class="text-white font-bold text-lg">愛猫との健やかな毎日のために</p>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-4">猫との暮らし、不安なことはありませんか？</h2>
            <p class="text-gray-600 mb-8 max-w-2xl mx-auto">「食べさせてはいけないものは？」「トイレトレーニングはどうする？」など、猫の飼育に関するあらゆる疑問にAIがお答えします。</p>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-left">
                <button onclick="quickAsk('猫に食べさせてはいけない危険な食べ物リストを教えて')" class="p-4 bg-orange-50 hover:bg-orange-100 rounded-xl border border-orange-100 transition flex items-center space-x-3">
                    <span class="text-2xl">🚫</span>
                    <span class="text-orange-900 font-bold">食べさせてはいけないもの</span>
                </button>
                <button onclick="quickAsk('初めて猫を飼う時に必要なグッズと予算は？')" class="p-4 bg-orange-50 hover:bg-orange-100 rounded-xl border border-orange-100 transition flex items-center space-x-3">
                    <span class="text-2xl">🏠</span>
                    <span class="text-orange-900 font-bold">お迎えの準備・費用</span>
                </button>
                <button onclick="quickAsk('猫が壁で爪研ぎするのを防ぐ方法は？')" class="p-4 bg-orange-50 hover:bg-orange-100 rounded-xl border border-orange-100 transition flex items-center space-x-3">
                    <span class="text-2xl">🐈</span>
                    <span class="text-orange-900 font-bold">爪研ぎ・しつけの悩み</span>
                </button>
                <button onclick="quickAsk('猫がなりやすい病気と日々のチェックポイント')" class="p-4 bg-orange-50 hover:bg-orange-100 rounded-xl border border-orange-100 transition flex items-center space-x-3">
                    <span class="text-2xl">🏥</span>
                    <span class="text-orange-900 font-bold">病気と健康チェック</span>
                </button>
            </div>
        </div>

        <!-- Chat Container -->
        <div id="chat-container" class="hidden flex-col space-y-4 mb-28">
            <!-- Messages will appear here -->
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden flex-col items-center justify-center p-8">
            <div class="loading-dots">
                <div class="dot1"></div>
                <div class="dot2"></div>
                <div class="dot3"></div>
            </div>
            <span class="mt-4 text-orange-600 text-sm font-bold">最新の飼育情報を検索しています...</span>
        </div>
    </main>

    <!-- Fixed Footer Input -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-orange-100 p-4 pb-6">
        <div class="max-w-4xl mx-auto flex items-center space-x-3">
            <input type="text" id="user-input" placeholder="例：猫が喜ぶおもちゃは？" 
                   class="flex-grow p-4 bg-gray-50 border border-orange-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-orange-400 focus:bg-white transition-all shadow-inner">
            <button id="send-btn" class="bg-orange-500 hover:bg-orange-600 text-white p-4 rounded-2xl transition shadow-lg active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
        </div>
    </footer>

    <script>
        const apiKey = ""; 
        const chatContainer = document.getElementById('chat-container');
        const welcomeScreen = document.getElementById('welcome-screen');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loading = document.getElementById('loading');

        async function fetchAIResponse(prompt) {
            const systemPrompt = "あなたは経験豊富な猫の飼育アドバイザーです。ユーザーからの質問に対し、親切で専門的なアドバイスをMarkdown形式で行ってください。特に「注意点」「危険なこと」は太字やリストを使って目立たせてください。回答にはGoogle検索による最新の知見を含め、信頼できる情報を提供してください。";
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                tools: [{ "google_search": {} }]
            };

            let retries = 5;
            let delay = 1000;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error('API request failed');

                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    const sources = result.candidates?.[0]?.groundingMetadata?.groundingAttributions?.map(a => ({
                        uri: a.web?.uri,
                        title: a.web?.title
                    })) || [];

                    return { text, sources };
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        function appendMessage(role, text, sources = []) {
            welcomeScreen.classList.add('hidden');
            chatContainer.classList.remove('hidden');
            chatContainer.classList.add('flex');

            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-bubble ${role === 'user' ? 'user-bubble' : 'ai-bubble'}`;
            
            if (role === 'ai') {
                // Markdownのパース（marked.jsを使用）
                let htmlContent = marked.parse(text);
                
                // ソースの追加
                if (sources.length > 0) {
                    htmlContent += `<div class="mt-4 pt-4 border-t border-orange-100">
                        <p class="text-xs font-bold text-orange-800 mb-2 uppercase tracking-wider">参考サイト</p>
                        <div class="flex flex-wrap">`;
                    sources.forEach(s => {
                        if (s.title && s.uri) {
                            htmlContent += `<a href="${s.uri}" target="_blank" class="source-link">🔗 ${s.title}</a>`;
                        }
                    });
                    htmlContent += `</div></div>`;
                }

                // 「戻る」ボタンの追加
                htmlContent += `
                    <div class="mt-6 pt-4 border-t border-orange-50 text-center">
                        <button onclick="resetToWelcome()" class="inline-flex items-center text-sm font-bold text-orange-600 hover:text-orange-800 bg-orange-50 px-4 py-2 rounded-full transition-colors border border-orange-100">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                            最初に戻って別のことを聞く
                        </button>
                    </div>
                `;

                messageDiv.innerHTML = htmlContent;
            } else {
                messageDiv.textContent = text;
            }
            
            chatContainer.appendChild(messageDiv);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        async function handleSend() {
            const prompt = userInput.value.trim();
            if (!prompt) return;

            userInput.value = '';
            appendMessage('user', prompt);
            
            loading.classList.remove('hidden');
            loading.classList.add('flex');

            try {
                const { text, sources } = await fetchAIResponse(prompt);
                appendMessage('ai', text, sources);
            } catch (error) {
                appendMessage('ai', '## エラーが発生しました\n申し訳ありません。情報の取得中に問題が発生しました。インターネット接続を確認し、もう一度お試しください。');
            } finally {
                loading.classList.add('hidden');
                loading.classList.remove('flex');
            }
        }

        function quickAsk(text) {
            userInput.value = text;
            handleSend();
        }

        function resetToWelcome() {
            chatContainer.innerHTML = '';
            chatContainer.classList.add('hidden');
            chatContainer.classList.remove('flex');
            welcomeScreen.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
